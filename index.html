<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    :root {
      color-scheme: light;
      --page: #0f172a;
      --panel: #111827;
      --display: #020617;
      --key: #1f2937;
      --key-hover: #374151;
      --operator: #f59e0b;
      --operator-hover: #fbbf24;
      --action: #475569;
      --action-hover: #64748b;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b, var(--page) 55%);
      color: var(--text);
    }

    .calculator {
      width: min(100%, 380px);
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      background: rgba(17, 24, 39, 0.92);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
    }

    .display {
      min-height: 118px;
      margin-bottom: 16px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
      border-radius: 18px;
      background: var(--display);
    }

    .previous-value {
      min-height: 24px;
      color: var(--muted);
      font-size: 1rem;
      word-break: break-all;
    }

    .current-value {
      width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
      text-align: right;
      font-size: clamp(2.25rem, 10vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
    }

    .current-value::-webkit-scrollbar {
      display: none;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      aspect-ratio: 1;
      border: 0;
      border-radius: 18px;
      background: var(--key);
      color: var(--text);
      font: inherit;
      font-size: 1.25rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease;
      user-select: none;
    }

    button:hover {
      background: var(--key-hover);
    }

    button:active {
      transform: scale(0.94);
    }

    button:focus-visible {
      outline: 3px solid #38bdf8;
      outline-offset: 2px;
    }

    .action {
      background: var(--action);
    }

    .action:hover {
      background: var(--action-hover);
    }

    .operator,
    .equals {
      background: var(--operator);
      color: #111827;
    }

    .operator:hover,
    .equals:hover {
      background: var(--operator-hover);
    }

    .operator.active {
      box-shadow: inset 0 0 0 3px #fff;
    }

    .zero {
      grid-column: span 2;
      aspect-ratio: auto;
      text-align: left;
      padding-left: 27px;
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <section class="display" aria-live="polite" aria-atomic="true">
      <div class="previous-value" id="previousValue"></div>
      <div class="current-value" id="currentValue">0</div>
    </section>

    <section class="keys">
      <button class="action" data-action="clear">AC</button>
      <button class="action" data-action="sign">±</button>
      <button class="action" data-action="percent">%</button>
      <button class="operator" data-operation="÷">÷</button>

      <button data-number="7">7</button>
      <button data-number="8">8</button>
      <button data-number="9">9</button>
      <button class="operator" data-operation="×">×</button>

      <button data-number="4">4</button>
      <button data-number="5">5</button>
      <button data-number="6">6</button>
      <button class="operator" data-operation="−">−</button>

      <button data-number="1">1</button>
      <button data-number="2">2</button>
      <button data-number="3">3</button>
      <button class="operator" data-operation="+">+</button>

      <button class="zero" data-number="0">0</button>
      <button data-number=".">.</button>
      <button class="equals" data-action="equals">=</button>
    </section>
  </main>

  <script>
    const currentValueElement = document.getElementById("currentValue");
    const previousValueElement = document.getElementById("previousValue");
    const keys = document.querySelector(".keys");

    let currentValue = "0";
    let storedValue = null;
    let selectedOperation = null;
    let waitingForOperand = false;
    let shouldResetAfterEquals = false;

    function formatForDisplay(value) {
      if (value === "Error") return value;

      const [integerPart, decimalPart] = String(value).split(".");
      const formattedInteger = Number(integerPart).toLocaleString("en-US", {
        maximumFractionDigits: 0,
      });

      return decimalPart !== undefined
        ? `${formattedInteger}.${decimalPart}`
        : formattedInteger;
    }

    function updateDisplay() {
      currentValueElement.textContent = formatForDisplay(currentValue);
      previousValueElement.textContent =
        storedValue !== null && selectedOperation
          ? `${formatForDisplay(storedValue)} ${selectedOperation}`
          : "";

      document.querySelectorAll(".operator").forEach((button) => {
        button.classList.toggle(
          "active",
          button.dataset.operation === selectedOperation && waitingForOperand
        );
      });

      currentValueElement.scrollLeft = currentValueElement.scrollWidth;
    }

    function inputNumber(number) {
      if (currentValue === "Error" || waitingForOperand || shouldResetAfterEquals) {
        currentValue = number === "." ? "0." : number;
        waitingForOperand = false;
        shouldResetAfterEquals = false;
        return;
      }

      if (number === ".") {
        if (!currentValue.includes(".")) currentValue += ".";
        return;
      }

      if (currentValue.replace("-", "").replace(".", "").length >= 12) return;
      currentValue = currentValue === "0" ? number : currentValue + number;
    }

    function calculate(first, second, operation) {
      switch (operation) {
        case "+":
          return first + second;
        case "−":
          return first - second;
        case "×":
          return first * second;
        case "÷":
          return second === 0 ? "Error" : first / second;
        default:
          return second;
      }
    }

    function normalizeResult(result) {
      if (result === "Error" || !Number.isFinite(result)) return "Error";
      return String(Number(result.toPrecision(12)));
    }

    function chooseOperation(operation) {
      if (currentValue === "Error") return;

      const inputValue = Number(currentValue);

      if (selectedOperation && !waitingForOperand) {
        const result = calculate(Number(storedValue), inputValue, selectedOperation);
        currentValue = normalizeResult(result);
        storedValue = currentValue === "Error" ? null : Number(currentValue);
      } else {
        storedValue = inputValue;
      }

      if (currentValue !== "Error") {
        selectedOperation = operation;
        waitingForOperand = true;
        shouldResetAfterEquals = false;
      } else {
        selectedOperation = null;
      }
    }

    function equals() {
      if (selectedOperation === null || waitingForOperand || currentValue === "Error") {
        return;
      }

      const secondValue = Number(currentValue);
      const expression = `${formatForDisplay(storedValue)} ${selectedOperation} ${formatForDisplay(currentValue)} =`;
      const result = calculate(Number(storedValue), secondValue, selectedOperation);

      currentValue = normalizeResult(result);
      previousValueElement.textContent = expression;
      storedValue = null;
      selectedOperation = null;
      waitingForOperand = false;
      shouldResetAfterEquals = true;
    }

    function clearCalculator() {
      currentValue = "0";
      storedValue = null;
      selectedOperation = null;
      waitingForOperand = false;
      shouldResetAfterEquals = false;
      previousValueElement.textContent = "";
    }

    function toggleSign() {
      if (currentValue !== "0" && currentValue !== "Error") {
        currentValue = String(Number(currentValue) * -1);
      }
    }

    function convertToPercent() {
      if (currentValue !== "Error") {
        currentValue = normalizeResult(Number(currentValue) / 100);
      }
    }

    function backspace() {
      if (waitingForOperand || shouldResetAfterEquals || currentValue === "Error") return;
      currentValue = currentValue.length > 1 ? currentValue.slice(0, -1) : "0";
      if (currentValue === "-") currentValue = "0";
    }

    keys.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      if (button.dataset.number !== undefined) {
        inputNumber(button.dataset.number);
      } else if (button.dataset.operation) {
        chooseOperation(button.dataset.operation);
      } else {
        const action = button.dataset.action;
        if (action === "clear") clearCalculator();
        if (action === "sign") toggleSign();
        if (action === "percent") convertToPercent();
        if (action === "equals") equals();
      }

      updateDisplay();
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key;

      if (/^[0-9.]$/.test(key)) inputNumber(key);
      else if (key === "+") chooseOperation("+");
      else if (key === "-") chooseOperation("−");
      else if (key === "*") chooseOperation("×");
      else if (key === "/") {
        event.preventDefault();
        chooseOperation("÷");
      } else if (key === "Enter" || key === "=") equals();
      else if (key === "Escape") clearCalculator();
      else if (key === "%") convertToPercent();
      else if (key === "Backspace") backspace();
      else return;

      updateDisplay();
    });

    updateDisplay();
  </script>
</body>
</html>
